# Redirect www to non-www
server {
    listen 80;
    server_name www.jwaddresses.yal99.com;
    return 301 https://jwaddresses.yal99.com$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.jwaddresses.yal99.com;

    ssl_certificate /etc/letsencrypt/live/jwaddresses.yal99.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jwaddresses.yal99.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    return 301 https://jwaddresses.yal99.com$request_uri;
}

# Main site - HTTP redirect
server {
    listen 80;
    server_name jwaddresses.yal99.com;
    return 301 https://jwaddresses.yal99.com$request_uri;
}

# Main site - HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name jwaddresses.yal99.com;

    ssl_certificate /etc/letsencrypt/live/jwaddresses.yal99.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jwaddresses.yal99.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/jwaddresses/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    access_log /var/log/nginx/jwaddresses_access.log;
    error_log /var/log/nginx/jwaddresses_error.log;
}
