volumes:
  postgres_data:
  redis_data:
networks:
  proxy-network:
    external: true
services:
  postgres:
    image: postgres:16-alpine
    container_name: jwaddresses-db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    networks:
      - proxy-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    container_name: jwaddresses-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: redis-server --requirepass ${REDIS_PASSWORD}
    networks:
      - proxy-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
  backend:
    build: ./backend
    container_name: jwaddresses-api
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      REDIS_HOST: redis
      DB_SSL: "false"
      REDIS_TLS: "false"
    networks:
      - proxy-network
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/', r => process.exit(0)).on('error', () => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
  frontend:
    build: ./frontend
    container_name: jwaddresses-web
    restart: unless-stopped
    networks:
      - proxy-network
    depends_on:
      - backend